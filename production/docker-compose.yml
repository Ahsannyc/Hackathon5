version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cloudflow-postgres
    environment:
      POSTGRES_USER: cloudflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: cloudflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudflow-network

  # MCP Server (AI Employee)
  mcp-server:
    build: .
    container_name: cloudflow-mcp-server
    environment:
      DATABASE_URL: postgresql://cloudflow:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cloudflow_db
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: cloudflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudflow-network

  # Monitoring Service (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: cloudflow-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - cloudflow-network

  # Monitoring Dashboards (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: cloudflow-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - cloudflow-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  cloudflow-network:
    driver: bridge
