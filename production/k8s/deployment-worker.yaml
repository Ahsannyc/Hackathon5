---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-worker
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: worker
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cloudflow-fte
      component: worker
  template:
    metadata:
      labels:
        app: cloudflow-fte
        component: worker
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Service Account for RBAC
      serviceAccountName: fte-worker-sa

      # Pod Anti-Affinity to spread workers across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cloudflow-fte
                - key: component
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname

      # Init containers to wait for dependencies
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done']
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

      - name: wait-for-kafka
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z kafka-broker 9092; do echo waiting for kafka; sleep 2; done']
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

      containers:
      - name: fte-worker
        image: cloudflow/fte-worker:latest
        imagePullPolicy: Always

        # Container arguments - run the message processor
        args:
        - python
        - -m
        - production.workers.message_processor

        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP

        # Environment variables from ConfigMap and Secrets
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets

        # Additional environment variables
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: WORKER_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: KAFKA_CONSUMER_GROUP
          value: "fte-message-processor-prod"

        # Resource requests and limits (workers are CPU/memory intensive)
        resources:
          requests:
            cpu: 750m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi

        # Liveness Probe - checks if worker is processing messages
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              if [ -f /tmp/worker_last_heartbeat ]; then
                LAST_BEAT=$(cat /tmp/worker_last_heartbeat)
                CURRENT_TIME=$(date +%s)
                TIME_DIFF=$((CURRENT_TIME - LAST_BEAT))
                if [ $TIME_DIFF -gt 300 ]; then
                  exit 1
                fi
              fi
              exit 0
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3

        # Readiness Probe - checks if worker can accept messages
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              if [ -f /tmp/worker_ready ]; then
                exit 0
              fi
              exit 1
          initialDelaySeconds: 45
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 2

        # Startup Probe - gives worker time to initialize
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - if [ -f /tmp/worker_started ]; then exit 0; fi; exit 1
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 20

        # Volume mounts
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp-volume
          mountPath: /tmp

        # Security Context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

        # Lifecycle hooks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 20"]

      # Volumes
      volumes:
      - name: config-volume
        configMap:
          name: fte-config
      - name: logs-volume
        emptyDir:
          sizeLimit: 5Gi
      - name: tmp-volume
        emptyDir:
          sizeLimit: 2Gi

      # Pod specifications
      terminationGracePeriodSeconds: 40
      dnsPolicy: ClusterFirst
      restartPolicy: Always

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fte-worker-sa
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: worker

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fte-worker-role
  namespace: fte-customer-success
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fte-worker-rolebinding
  namespace: fte-customer-success
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fte-worker-role
subjects:
- kind: ServiceAccount
  name: fte-worker-sa
  namespace: fte-customer-success
