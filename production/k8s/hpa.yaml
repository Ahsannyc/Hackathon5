---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-api-hpa
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-worker-hpa
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-worker
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Percent
        value: 33
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 3
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fte-api-pdb
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cloudflow-fte
      component: api
  unhealthyPodEvictionPolicy: AlwaysAllow

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fte-worker-pdb
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: worker
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cloudflow-fte
      component: worker
  unhealthyPodEvictionPolicy: AlwaysAllow

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: fte-quota
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    services: "10"
    services.nodeports: "5"
    services.loadbalancers: "2

---
apiVersion: v1
kind: LimitRange
metadata:
  name: fte-limit-range
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
spec:
  limits:
  - type: Container
    max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
  - type: Pod
    max:
      cpu: "4"
      memory: "4Gi"
    min:
      cpu: "200m"
      memory: "256Mi"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fte-monitor
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    prometheus: default
spec:
  selector:
    matchLabels:
      app: cloudflow-fte
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
