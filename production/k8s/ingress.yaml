---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fte-ingress
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: routing
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60s"
    nginx.ingress.kubernetes.io/limit-connections: "10"
spec:
  tls:
  - hosts:
    - api.cloudflow.example.com
    - cloudflow.example.com
    secretName: fte-tls-cert
  rules:
  - host: api.cloudflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fte-api-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fte-api-service
            port:
              number: 80
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: fte-api-service
            port:
              number: 80
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: fte-metrics-service
            port:
              number: 9090

  - host: cloudflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fte-api-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fte-api-service
            port:
              number: 80

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: fte-tls-cert
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
spec:
  secretName: fte-tls-cert
  duration: 2160h
  renewBefore: 360h
  commonName: api.cloudflow.example.com
  dnsNames:
  - api.cloudflow.example.com
  - cloudflow.example.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app: cloudflow-fte
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cloudflow.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app: cloudflow-fte
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@cloudflow.example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fte-network-policy
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
spec:
  podSelector:
    matchLabels:
      app: cloudflow-fte
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: fte-customer-success
    - podSelector:
        matchLabels:
          app: cloudflow-fte
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9090
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 9093
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
