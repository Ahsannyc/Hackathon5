---
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: secrets
type: Opaque
stringData:
  # Cohere API Configuration
  COHERE_KEY: "<REPLACE_WITH_COHERE_API_KEY>"

  # Database Credentials
  DATABASE_URL: "postgresql://<DB_USER>:<DB_PASSWORD>@postgres-service:5432/cloudflow_db"
  DATABASE_USER: "<DB_USER>"
  DATABASE_PASSWORD: "<DB_PASSWORD>"

  # Twilio WhatsApp Credentials
  TWILIO_ACCOUNT_SID: "<REPLACE_WITH_TWILIO_ACCOUNT_SID>"
  TWILIO_AUTH_TOKEN: "<REPLACE_WITH_TWILIO_AUTH_TOKEN>"
  TWILIO_NUMBER: "<REPLACE_WITH_TWILIO_PHONE_NUMBER>"

  # Gmail OAuth Credentials (for polling)
  GMAIL_CLIENT_ID: "<REPLACE_WITH_GMAIL_CLIENT_ID>"
  GMAIL_CLIENT_SECRET: "<REPLACE_WITH_GMAIL_CLIENT_SECRET>"
  GMAIL_REFRESH_TOKEN: "<REPLACE_WITH_GMAIL_REFRESH_TOKEN>"

  # Kafka Security (if SASL enabled)
  KAFKA_SASL_USERNAME: "<OPTIONAL_KAFKA_USERNAME>"
  KAFKA_SASL_PASSWORD: "<OPTIONAL_KAFKA_PASSWORD>"
  KAFKA_SASL_MECHANISM: "PLAIN"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"

  # JWT Secret for API Authentication (if implementing in future)
  JWT_SECRET_KEY: "<GENERATE_RANDOM_SECRET_KEY>"
  JWT_ALGORITHM: "HS256"

  # Encryption Keys
  ENCRYPTION_KEY: "<GENERATE_RANDOM_ENCRYPTION_KEY>"

  # Webhook Signing Keys (internal)
  WEBHOOK_SECRET_KEY: "<GENERATE_RANDOM_WEBHOOK_SECRET>"

  # Cloud Storage Credentials (if using S3 for logs)
  AWS_ACCESS_KEY_ID: "<OPTIONAL_AWS_ACCESS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<OPTIONAL_AWS_SECRET_KEY>"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "cloudflow-fte-logs"

  # Email Configuration (for alerting)
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "<SMTP_USERNAME>"
  SMTP_PASSWORD: "<SMTP_PASSWORD>"
  SMTP_FROM_EMAIL: "alerts@cloudflow.example.com"

  # PagerDuty Integration (for alerting)
  PAGERDUTY_INTEGRATION_KEY: "<OPTIONAL_PAGERDUTY_KEY>"

  # Slack Integration (for notifications)
  SLACK_WEBHOOK_URL: "<OPTIONAL_SLACK_WEBHOOK_URL>"

---
apiVersion: v1
kind: Secret
metadata:
  name: fte-postgres-secret
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: database
type: Opaque
stringData:
  username: "<DB_USER>"
  password: "<DB_PASSWORD>"

---
apiVersion: v1
kind: Secret
metadata:
  name: fte-docker-registry
  namespace: fte-customer-success
  type: kubernetes.io/dockercfg
data:
  # Base64 encoded docker config for pulling images from private registry
  # If using public Docker Hub, this can be omitted
  .dockercfg: eyJkb2NrZXIuaW8iOnsidXNlcm5hbWUiOiI8RE9DS0VSX1VTRVJOQU1FPiIsInBhc3N3b3JkIjoiPERPQ0tFUl9QQVNTV09SRD4ifX0=
