---
apiVersion: v1
kind: Service
metadata:
  name: fte-api-service
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: api
  annotations:
    description: "Service for CloudFlow FTE FastAPI endpoints"
spec:
  type: ClusterIP
  selector:
    app: cloudflow-fte
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: v1
kind: Service
metadata:
  name: fte-api-nodeport
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: api
  annotations:
    description: "NodePort service for local development and testing"
spec:
  type: NodePort
  selector:
    app: cloudflow-fte
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    nodePort: 30080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    nodePort: 30090
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: fte-metrics-service
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: monitoring
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: cloudflow-fte
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-broker
  namespace: fte-customer-success
  labels:
    app: cloudflow-fte
    component: messaging
spec:
  type: ClusterIP
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
    protocol: TCP
  - name: controller
    port: 9093
    targetPort: 9093
    protocol: TCP
